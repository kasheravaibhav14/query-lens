spring.application.name=analysis-engine
server.port=8083

# Virtual threads (Project Loom)
spring.threads.virtual.enabled=true

# Disable Spring Boot DataSource auto-config — ClickHouseConfig manages its own DataSource
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=analysis-engine
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# InMemoryWindowStore — rolling window for rule evaluation (eviction cutoff)
query-lens.window.duration-millis=60000

# Rule engine thresholds (all configurable, sensible defaults)
query-lens.rules.collscan.min-docs-examined=500
query-lens.rules.collscan.min-duration-millis=100
query-lens.rules.collscan.min-occurrences=2
query-lens.rules.selectivity.min-ratio=50
query-lens.rules.selectivity.min-duration-millis=100
query-lens.rules.selectivity.min-occurrences=2
query-lens.rules.retry-storm.min-occurrences=10

# ClickHouse — disabled until connection is configured (see ClickHouseConfig.java)
query-lens.clickhouse.enabled=false
query-lens.clickhouse.url=jdbc:clickhouse://localhost:8123/default
query-lens.clickhouse.username=default
query-lens.clickhouse.password=
query-lens.clickhouse.flush-interval-millis=1000

# Actuator
management.endpoints.web.exposure.include=health,info
