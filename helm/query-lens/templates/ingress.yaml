{{/*
  CONCEPT: Ingress
    An Ingress is a k8s resource that defines HTTP/HTTPS routing rules.
    It does NOT do the routing itself — an Ingress Controller (here: NGINX)
    watches Ingress resources and programs itself accordingly.

  CONCEPT: IngressClass
    In newer k8s (1.18+), you specify which controller handles this Ingress
    via spec.ingressClassName. This allows multiple ingress controllers to
    coexist in the same cluster.

  CONCEPT: Load balancer for HTTP vs TCP
    Ingress handles HTTP/HTTPS only. For raw TCP (Postgres :5432, Kafka :9092),
    NGINX Ingress can proxy TCP via a ConfigMap, but this requires patching the
    NGINX controller deployment — outside the scope of this chart.

    Local alternative: use the NodePort on kafka (port 30092 → minikube ip).
    Production alternative: expose Kafka/Postgres via a dedicated Service of
    type LoadBalancer (cloud-provisioned NLB/ALB with TCP support).

  CONCEPT: {{ if .Values.ingress.enabled }} gate
    Lets you disable Ingress entirely (e.g. for a pure-internal deployment)
    without touching template files.
*/}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: query-lens-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "query-lens.labels" . | nindent 4 }}
  annotations: {}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # TenantController is mapped at /api/v1/tenants — no prefix stripping.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tenant-api
                port:
                  number: {{ .Values.tenantApi.service.port }}
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: ingestion
                port:
                  number: {{ .Values.ingestion.service.port }}
          - path: /analyze
            pathType: Prefix
            backend:
              service:
                name: analysis-engine
                port:
                  number: {{ .Values.analysisEngine.service.port }}
{{- end }}
