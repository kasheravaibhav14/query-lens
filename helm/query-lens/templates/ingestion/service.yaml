apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "query-lens.labels" . | nindent 4 }}
    app: ingestion
spec:
  type: ClusterIP
  selector:
    app: ingestion
  ports:
    - name: http
      port: {{ .Values.ingestion.service.port }}
      targetPort: 8082
