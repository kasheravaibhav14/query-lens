{{/*
  CONCEPT: Headless Service (clusterIP: None)
    Required by the StatefulSet's serviceName field. It doesn't load-balance —
    instead it creates DNS A records for each pod individually:
      postgres-0.postgres-headless.query-lens.svc.cluster.local → pod IP

    This is how StatefulSet pods get stable, addressable identities.

  CONCEPT: Regular ClusterIP Service
    This is what the tenant-api uses to talk to postgres. It provides a single
    stable virtual IP that k8s load-balances across healthy pods. Even with one
    replica today, using a Service decouples the app from the pod IP, which
    changes every time the pod restarts.
*/}}

# Headless service — gives each postgres pod a stable DNS name.
# Required by the StatefulSet spec.serviceName field.
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "query-lens.labels" . | nindent 4 }}
    app: postgres
spec:
  clusterIP: None    # <- this is what makes it "headless"
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Regular ClusterIP service — what tenant-api connects to.
# DNS: postgres.query-lens.svc.cluster.local:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "query-lens.labels" . | nindent 4 }}
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
