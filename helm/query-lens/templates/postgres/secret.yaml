{{/*
  CONCEPT: Kubernetes Secret
    Secrets store sensitive data as base64-encoded values (NOT encrypted by
    default — encryption at rest must be enabled separately on the cluster).

  CONCEPT: b64enc
    Helm's | b64enc filter encodes the string to base64, which is what k8s
    Secrets require in the `data` block. (Use `stringData` to skip encoding.)

  CONCEPT: quote
    Wraps the value in YAML quotes, preventing accidental YAML type coercion
    (e.g. "true" being parsed as boolean, "123" as integer).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "query-lens.labels" . | nindent 4 }}
    app: postgres
type: Opaque
data:
  username: {{ .Values.postgres.auth.username | b64enc | quote }}
  password: {{ .Values.postgres.auth.password | b64enc | quote }}
  database: {{ .Values.postgres.auth.database | b64enc | quote }}
