{{/*
  CONCEPT: HorizontalPodAutoscaler
    Automatically scales the number of Deployment replicas based on observed
    CPU (or custom metrics). Requires the metrics-server to be running in the
    cluster.

  CONCEPT: {{ if .Values.tenantApi.hpa.enabled }} conditional
    This entire resource is only emitted when hpa.enabled=true. In local dev
    (no metrics-server) the file produces zero output — no broken resource.
    In prod, flip the flag in values-prod.yaml and the HPA appears.

    This is a core Helm pattern: feature-flag entire resources via values,
    so the same chart works across environments without manual file editing.
*/}}
{{- if .Values.tenantApi.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tenant-api-hpa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "query-lens.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tenant-api
  minReplicas: {{ .Values.tenantApi.hpa.minReplicas }}
  maxReplicas: {{ .Values.tenantApi.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.tenantApi.hpa.targetCPUUtilizationPercentage }}
{{- end }}
